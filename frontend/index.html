<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .question {
            margin-bottom: 20px;
        }

        .question p {
            font-weight: bold;
        }

        .option {
            display: block;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: 0.3s;
        }

        .option:hover {
            background: #f0f4ff;
            border-color: #2575fc;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2575fc;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1a5ed8;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Quiz App</h2>
    <div id="quiz"></div>
    <button onclick="submitQuiz()">Submit</button>
</div>

<script src="script.js"></script>
</body>
</html>
